<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flow State – Task Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* RASION PROJECT THEME */
:root[data-theme="dark"] {
  --bg: #0b0c10;
  --bg2: #14161f;
  --bg3: #1f222e;
  --bg4: #2a2e3d;
  --card: transparent;
  --card2: #14161f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text2: #a1a1aa;
  --text3: #71717a;
  
  /* Signature Purple */
  --accent: #8b5cf6;
  --accent2: #d8b4fe;
  --glow: rgba(139, 92, 246, 0.15);
  
  --green: #22c55e; --gbg: rgba(34,197,94,0.15);
  --red: #ef4444;   --rbg: rgba(239,68,68,0.15);
  --yellow: #eab308;--ybg: rgba(234,179,8,0.15);
  --blue: #3b82f6;  --bbg: rgba(59,130,246,0.15);
  
  --shadow: none;
  --shadow2: 0 8px 24px rgba(0,0,0,0.4);
  --scrim: rgba(11, 12, 16, 0.95);
}
:root[data-theme="light"] {
  --bg: #ffffff;
  --bg2: #f4f4f5;
  --bg3: #e4e4e7;
  --bg4: #d4d4d8;
  --card: transparent;
  --card2: #f4f4f5;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.12);
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  
  --accent: #7c3aed;
  --accent2: #c4b5fd;
  --glow: rgba(124, 58, 237, 0.1);
  
  --green: #16a34a; --gbg: rgba(22,163,74,0.15);
  --red: #dc2626;   --rbg: rgba(220,38,38,0.15);
  --yellow: #ca8a04;--ybg: rgba(202,138,4,0.15);
  --blue: #2563eb;  --bbg: rgba(37,99,235,0.15);
  
  --shadow: none;
  --shadow2: 0 8px 24px rgba(0,0,0,0.08);
  --scrim: rgba(255, 255, 255, 0.98);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden;position:relative;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:24px 22px 16px;background:var(--bg);flex-shrink:0;position:relative;z-index:300;}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo svg{display:none;}
.logo-txt{font-weight:700;font-size:20px;letter-spacing:-.5px;}
.h-actions{display:flex;align-items:center;gap:10px;}
.ibtn{width:42px;height:42px;border-radius:12px;border:none;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.ibtn:hover{background:var(--bg2);}

/* TOOLBAR & FILTERS */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 22px 16px;flex-shrink:0;}
.q-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.q-lbl{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;}
.q-time{font-size:13px;font-weight:600;color:var(--accent);background:var(--glow);padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums;}
.q-cnt{font-size:13px;color:var(--text3);font-weight:500;}

.filters { display: flex; gap: 10px; padding: 0 22px 16px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.filters::-webkit-scrollbar { display: none; }
.fpill { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .2s; }
.fpill:hover { background: var(--bg3); color: var(--text); }
.fpill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* SORT DROPDOWN (Now unified with modals/drawers) */
.sort-wrap{position:relative;}
.sort-ibtn.on{color:var(--accent);}
.sdrop{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:var(--shadow2);z-index:350;min-width:220px;display:none;padding:8px;}
.sdrop.open{display:block;animation:fdwn .15s ease;}
@keyframes fdwn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.sopt{display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:4px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:background .15s;border-radius:14px;}
.sopt:last-child{margin-bottom:0;}
.sopt:hover{background:var(--bg3);color:var(--text);}
.sopt.on{color:var(--accent);}
.schk{margin-left:auto;color:var(--accent);}
.sort-dir-wrap {display:flex; padding: 0 0 12px; margin-bottom: 8px; gap:6px; border-bottom: 1px solid var(--border); background: transparent;}
.sort-dir-btn {flex: 1; padding: 8px 0; border-radius: 12px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; display:flex; align-items:center; justify-content:center; gap:6px; transition: all .2s;}
.sort-dir-btn:hover {color: var(--text2);}
.sort-dir-btn.active {background: var(--bg3); color: var(--text);}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 22px 130px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:10px;}

/* 100% FULLSCREEN FOCUS OVERLAY */
.at-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
.atcard { background: transparent; border: none; padding: 0; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 360px; }
.at-secondary-ctrls{position:absolute;top:-60px;left:0px;right:0px;display:flex;justify-content:space-between;align-items:center;}
.at-sec-left{display:flex;gap:4px;}
.sec-btn{width:40px;height:40px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.sec-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--text3);}
.sec-btn.del:hover{background:var(--rbg);color:var(--red);border-color:var(--red);}

/* Centered Task Info */
.at-info-center{text-align:center;margin-bottom:48px;width:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;}
.at-name{font-size:26px;font-weight:700;color:var(--text);word-break:break-word;line-height:1.2;}

/* Large Gradient Ring */
.ring-wrap{position:relative;width:240px;height:240px;margin-bottom:60px;}
.rsvg{width:240px;height:240px;transform:rotate(-90deg);}
.rbg{fill:none;stroke:var(--bg3);stroke-width:12;}
.rfg{fill:none;stroke:url(#timerGradient);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s;}
.rtime{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums;color:var(--text);}

/* Icon+Label Primary Controls */
.at-primary-ctrls{display:flex;gap:36px;justify-content:center;align-items:flex-start;width:100%;margin-bottom:32px;}
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.pbtn{width:64px;height:64px;border-radius:50%;background:var(--bg3);color:var(--text);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.pbtn:active{transform:scale(.92);}
.pbtn:hover{background:var(--bg4);}
.ctrl-lbl{font-size:13px;font-weight:600;color:var(--text2);}

/* Compact Chips for Extra Time */
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.chip{padding:12px 20px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;box-shadow:var(--shadow2);}
.chip:hover{border-color:var(--accent);background:var(--bg3);}
.chip:active{transform:scale(0.95);}

/* PRIORITY PILLS */
.p-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.p-pill.critical { background: var(--rbg); color: var(--red); }
.p-pill.high { background: var(--ybg); color: var(--yellow); }
.p-pill.medium { background: var(--gbg); color: var(--green); }
.p-pill.low { background: var(--bbg); color: var(--blue); }

/* MINI TIMER */
.mini-timer { background: var(--bg2); border: none; border-radius: 20px; padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all .2s; box-shadow: var(--shadow2); }
.mini-timer:hover { background: var(--bg3); }
.mt-info { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
.mt-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.mt-right { display: flex; align-items: center; gap: 16px; }
.mt-time { font-size: 15px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.mt-play { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg3); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.mt-play:hover { background: var(--bg4); }
.mt-play:active { transform: scale(.9); }

/* SECTION HDR */
.shdr{display:flex;align-items:center;gap:10px;padding:8px 0 10px;color:var(--text3);font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;}
.sline{flex:1;height:1px;background:var(--border);}

/* NEW CHUNKY TASK CARDS */
.ti-wrap { position: relative; margin-bottom: 16px; border-radius: 20px; background: var(--bg3); overflow: hidden; }
.ti-bg { position: absolute; top: 0; bottom: 0; width: 100%; display: flex; align-items: center; padding: 0 24px; color: #fff; opacity: 0; z-index: 0; }
.ti-bg-left { left: 0; background: var(--green); justify-content: flex-start; }
.ti-bg-right { right: 0; background: var(--red); justify-content: flex-end; }

/* Main Foreground Task Card */
.ti { background: var(--bg2); border-radius: 20px; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; transition: all .2s; user-select: none; position: relative; z-index: 1; touch-action: pan-y; }
.ti.dragging { opacity: .35; transform: scale(.97); }
.ti.drag-over { background: var(--bg4); transform: scale(1.01); }

/* Card Header (Priority + Checkbox) */
.ti-header { display: flex; justify-content: space-between; align-items: center; }
.ti-checkbox { width: 22px; height: 22px; border: 2px solid var(--text3); border-radius: 50%; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
.ti-checkbox:hover { border-color: var(--accent); background: var(--glow); }
.ti-checkbox:active { transform: scale(0.9); }

/* Card Body (Name + Desc) */
.ti-body { display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
.tname { font-size: 16px; font-weight: 600; color: var(--text); }
.tdesc { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Card Footer (Time + Drag + Start) */
.ti-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.ttime-wrap { display: flex; align-items: center; gap: 8px; }
.dh { color: var(--text3); cursor: grab; flex-shrink: 0; touch-action: none; padding: 2px; display: flex; align-items: center; }
.ttime { font-size: 13px; font-weight: 600; color: var(--text3); }
.tbtn { padding: 8px 14px; border-radius: 12px; border: none; background: var(--bg3); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .18s; }
.tbtn:active { transform: scale(.92); }
.tbtn.start:hover { background: var(--glow); color: var(--accent); }

/* FOLDER ITEMS */
.fi{background:var(--bg3);border-radius:16px;margin-bottom:10px;padding:16px 18px;display:flex;align-items:center;gap:12px;opacity:.8;}
.fi-info{flex:1;min-width:0;}
.fi-name{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-meta{font-size:13px;color:var(--text3);margin-top:4px;}
.fi-btns{display:flex;gap:6px;flex-shrink:0;}
.rbtn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg4);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rbtn:hover{color:var(--text);background:var(--bg4);}
.pbtn-folder{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pbtn-folder:hover{color:var(--text);background:var(--bg4);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty svg{margin-bottom:18px;opacity:.35;}
.empty p{font-size:15px;line-height:1.6;}

/* FAB */
.fab{position:absolute;bottom:32px;right:22px;width:60px;height:60px;border-radius:50%;background:var(--accent);border:none;color:#fff;box-shadow:0 8px 24px var(--glow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:200;}
.fab:active{transform:scale(.92);}

/* DRAWER & MODALS (Unified surfaces) */
.dscrim{position:fixed;inset:0;background:var(--scrim);z-index:400;display:none;backdrop-filter:blur(4px);}
.dscrim.open{display:block;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:320px;background:var(--bg2);border-left:1px solid var(--border);z-index:401;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow2);}
.drawer.open{transform:translateX(0);}
.dh2{display:flex;align-items:center;justify-content:space-between;padding:24px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dtitle{font-size:18px;font-weight:700;}
.dclose{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dclose:hover{background:var(--bg3);color:var(--text);}
.dbody{flex:1;overflow-y:auto;padding:12px 12px 0;}
.dseclbl{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;padding:14px 12px 8px;}
.ditem{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:14px;cursor:pointer;transition:background .18s;border:none;background:transparent;color:var(--text);font-size:15px;font-weight:500;width:100%;text-align:left;}
.ditem:hover{background:var(--bg3);}
.dicon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg3);color:var(--text2);}
.dlbl{flex:1;}
.dbadge{font-size:12px;font-weight:700;background:var(--bg4);color:var(--text2);border-radius:20px;padding:2px 10px;}
.ddivider{height:1px;background:var(--border);margin:8px 12px;}
.toggle-row{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:14px;}
.track{width:50px;height:28px;border-radius:20px;background:var(--bg4);border:1px solid var(--border);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
.track.on{background:var(--accent);border-color:var(--accent);}
.thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 4px rgba(0,0,0,.2);}
.track.on .thumb{transform:translateX(22px);}

/* AUTH FORMS */
.auth-box { padding: 0 12px 14px; }
.auth-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; margin-bottom: 8px; outline: none; transition: border-color 0.2s; }
.auth-input:focus { border-color: var(--accent); }
.auth-btns { display: flex; gap: 8px; }
.btn-primary { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn-primary:active { opacity: 0.8; }
.btn-secondary { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-secondary:hover { background: var(--bg4); }
.auth-divider { text-align: center; color: var(--text3); font-size: 12px; margin: 12px 0; display: flex; align-items: center; }
.auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

.mscrim{position:fixed;inset:0;background:var(--scrim);z-index:500;display:none;align-items:flex-start; justify-content:center;backdrop-filter:blur(8px);padding:20px;}
.mscrim.open{display:flex;}
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 28px; padding: 24px 24px 32px; width: 100%; max-width: 480px; box-shadow: var(--shadow2); animation: sdown .28s cubic-bezier(.34,1.56,.64,1); max-height: calc(100vh - 40px); max-height: calc(100dvh - 40px); overflow-y: auto; overscroll-behavior: contain; }
@keyframes sdown{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mtitle{font-size:20px;font-weight:700;margin-bottom:24px;}
.fg{margin-bottom:20px;}
.flbl{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:block;}
.finput{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color .2s; resize:none;}
.finput:focus{border-color:var(--accent);}
.trow{display:flex;gap:10px;align-items:center;}
.trow .finput{text-align:center;}
.tsep{color:var(--text2);font-weight:700;font-size:16px;flex-shrink:0;}

.preset-btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.preset-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--text3); }
.preset-btn:active { transform: scale(0.95); }

.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.popt{padding:12px 6px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;text-align:center;}
.popt.sc{border-color:var(--red);color:var(--red);background:var(--rbg);}
.popt.sh{border-color:var(--yellow);color:var(--yellow);background:var(--ybg);}
.popt.sm{border-color:var(--green);color:var(--green);background:var(--gbg);}
.popt.sl{border-color:var(--blue);color:var(--blue);background:var(--bbg);}
.mactions{display:flex;gap:12px;margin-top:28px;}
.bcancel{flex:1;padding:16px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s, color 0.2s;}
.bcancel:hover{background:var(--bg4);color:var(--text);}
.bsave{flex:2;padding:16px;border-radius:16px;border:none;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px var(--glow);}

.tlist{max-height:280px;overflow-y:auto;}
.titem{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);margin-bottom:8px;cursor:pointer;transition:all .2s;}
.titem:hover{border-color:var(--text3);}
.tiname{font-size:14px;font-weight:500;}
.ticnt{font-size:12px;color:var(--text3);margin-top:2px;}
.tidel{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;}
.tidel:hover{color:var(--text);}

.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="hlogo">
      <span class="logo-txt">Flow State</span>
    </div>
    <div class="h-actions">

<script type="module">
// ===== FIREBASE INIT =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-IHXckHU4-M4JQQyzToTJ0mj8MAh9sE4",
  authDomain: "flow-state-5c333.firebaseapp.com",
  projectId: "flow-state-5c333",
  storageBucket: "flow-state-5c333.firebasestorage.app",
  messagingSenderId: "887161163486",
  appId: "1:887161163486:web:3c5ba16236fe30879ebc4f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let unsubSnapshot = null;

// Handle Auth State Changes & Real-Time Sync
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    
    // Update UI for logged in state
    document.getElementById('authSignedOut').style.display = 'none';
    document.getElementById('authSignedIn').style.display = 'block';
    document.getElementById('currentUserLbl').textContent = "Signed in as " + (user.displayName || user.email);
    
    // REAL-TIME LISTENER
    unsubSnapshot = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        tasks = data.tasks || [];
        completed = data.completed || [];
        deleted = data.deleted || [];
        templates = data.templates || [];
        
        // Sync Active Timer State
        const ast = data.activeState;
        if (ast) {
           // Prevent the active ticking timer from stuttering if local state is roughly the same
           if (ast.id !== activeId || ast.paused !== paused || Math.abs(ast.secsLeft - secsLeft) > 5) {
               activeId = ast.id;
               secsLeft = ast.secsLeft;
               totalSecs = ast.totalSecs;
               origSecs = ast.origSecs;
               paused = ast.paused;
               
               if (activeId) {
                   const t = tasks.find(x => x.id === activeId);
                   if (t) {
                       showAT(t);
                       syncPlayPauseUI();
                       if (!paused) { clearInterval(ticker); tick(); }
                       else { clearInterval(ticker); }
                   } else {
                       stopTimerLocalUI();
                   }
               } else {
                   stopTimerLocalUI();
               }
           }
        } else {
           if(activeId) stopTimerLocalUI();
        }
        
        saveLocalOnly();
        render();
      }
    }, (error) => {
      console.error("Real-time sync error:", error);
    });

  } else {
    currentUser = null;
    
    // Update UI for logged out state
    document.getElementById('authSignedOut').style.display = 'block';
    document.getElementById('authSignedIn').style.display = 'none';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPass').value = '';
    
    if (unsubSnapshot) {
      unsubSnapshot();
      unsubSnapshot = null;
    }
  }
});

// Auth Functions
window.emailLogin = async function() {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  if(!email || !pass) { toast("Enter email and password."); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    closeDrawer();
  } catch(e) {
    toast("Login failed. Check credentials.");
    console.error(e);
  }
};

window.resetPassword = async function() {
  const email = document.getElementById('authEmail').value.trim();
  if(!email) { 
    toast("Enter your email address first."); 
    return; 
  }
  try {
    await sendPasswordResetEmail(auth, email);
    toast("Password reset email sent!");
  } catch(e) {
    toast("Error sending reset email.");
    console.error(e);
  }
};

window.logOutUser = async function() {
  await signOut(auth);
  toast("Working offline.");
  closeDrawer();
};

// ===== AUDIO =====
let sndCtx=null,sndOn=true;
function ac(){if(!sndCtx)sndCtx=new(window.AudioContext||window.webkitAudioContext)();if(sndCtx.state==='suspended')sndCtx.resume();return sndCtx;}

function playAlarm(){
  if(!sndOn)return;
  try{
    const c=ac(),m=c.createGain();m.gain.value=0.2;m.connect(c.destination);
    const p=(f,d,t='sine',v=1,dl=0)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type=t;o.frequency.value=f;
      g.gain.setValueAtTime(0,c.currentTime+dl);
      g.gain.linearRampToValueAtTime(v,c.currentTime+dl+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dl+d);
      o.connect(g);g.connect(m);o.start(c.currentTime+dl);o.stop(c.currentTime+dl+d+0.05);
    };
    
    const alarmType = document.getElementById('alarmSel').value;
    
    if(alarmType === 'default') {
      for(let i=0;i<3;i++){p(880,.12,'square',.5,i*.22);p(440,.1,'square',.3,i*.22+.12);}
    } else if (alarmType === 'chime') {
      p(1047, .2); p(1318, .6, 'sine', 1, .25);
    } else if (alarmType === 'buzzer') {
      for(let i=0;i<4;i++){p(300,.2,'sawtooth',.6,i*.3);}
    }
  }catch(e){}
}

const sndTrack=document.getElementById('sndtrack');
sndTrack.onclick=()=>{sndOn=!sndOn;sndTrack.classList.toggle('on',sndOn);localStorage.setItem('ff_snd',sndOn?'1':'0');};
if(localStorage.getItem('ff_snd')==='0'){sndOn=false;sndTrack.classList.remove('on');}

const alarmSel = document.getElementById('alarmSel');
alarmSel.value = localStorage.getItem('ff_alarm') || 'default';
alarmSel.addEventListener('change', (e) => {
  localStorage.setItem('ff_alarm', e.target.value);
  playAlarm(); 
});

// ===== STATE =====
let tasks=JSON.parse(localStorage.getItem('ff_t')||'[]');
let completed=JSON.parse(localStorage.getItem('ff_c')||'[]');
let deleted=JSON.parse(localStorage.getItem('ff_d')||'[]');
let templates=JSON.parse(localStorage.getItem('ff_tmpl')||'[]');

let activeId=null,ticker=null,secsLeft=0,totalSecs=0,origSecs=0,paused=true;

// Local Saving
function saveLocalOnly() {
  localStorage.setItem('ff_t',JSON.stringify(tasks));
  localStorage.setItem('ff_c',JSON.stringify(completed));
  localStorage.setItem('ff_d',JSON.stringify(deleted));
  localStorage.setItem('ff_tmpl',JSON.stringify(templates));
  localStorage.setItem('ff_active', JSON.stringify({id: activeId, secsLeft, totalSecs, origSecs, paused}));
}

// Cloud Saving
async function save(){
  saveLocalOnly();
  if (currentUser) {
    try {
      await setDoc(doc(db, "users", currentUser.uid), {
        tasks, completed, deleted, templates,
        activeState: {id: activeId, secsLeft, totalSecs, origSecs, paused},
        lastUpdated: Date.now()
      }, { merge: true });
    } catch (e) {
      console.error("Cloud Sync Error:", e);
    }
  }
}

// ===== GMAIL SWIPE LOGIC =====
let swEl = null, swStartX = 0, swStartY = 0, isSw = null;
function onSwipeStart(e){
  if(e.target.closest('.dh') || e.target.closest('.tbtn') || e.target.closest('.ti-checkbox')) return;
  swEl = this;
  swStartX = e.touches[0].clientX;
  swStartY = e.touches[0].clientY;
  isSw = null;
  swEl.style.transition = 'none';
}
function onSwipeMove(e){
  if(!swEl) return;
  const x = e.touches[0].clientX, y = e.touches[0].clientY;
  const dx = x - swStartX, dy = y - swStartY;
  
  if(isSw === null){
    if(Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) isSw = true;
    else if(Math.abs(dy) > 10) isSw = false;
  }
  
  if(isSw){
    e.preventDefault(); 
    swEl.style.transform = `translateX(${dx}px)`;
    
    const wrap = swEl.parentElement;
    const bgL = wrap.querySelector('.ti-bg-left');
    const bgR = wrap.querySelector('.ti-bg-right');
    
    if(dx > 0) { 
      bgL.style.opacity = Math.min(dx / 60, 1); 
      bgR.style.opacity = 0; 
    } else { 
      bgL.style.opacity = 0; 
      bgR.style.opacity = Math.min(-dx / 60, 1); 
    }
  }
}
function onSwipeEnd(e){
  if(!swEl) return;
  if(isSw){
    const dx = parseFloat(swEl.style.transform.replace('translateX(','')) || 0;
    swEl.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)';
    const tid = swEl.dataset.id;
    
    if(dx > 80){
      swEl.style.transform = `translateX(100%)`;
      setTimeout(()=> window.completeTask(tid), 250);
    } else if(dx < -80){
      swEl.style.transform = `translateX(-100%)`;
      setTimeout(()=> window.deleteTask(tid), 250);
    } else {
      swEl.style.transform = `translateX(0)`;
      const wrap = swEl.parentElement;
      setTimeout(() => {
         wrap.querySelector('.ti-bg-left').style.opacity = 0;
         wrap.querySelector('.ti-bg-right').style.opacity = 0;
      }, 250);
    }
  }
  swEl = null;
}

// ===== RENDER =====
function render(){
  let q=tasks.filter(t=>t.id!==activeId);
  
  // Apply Filter First
  if(activeFilter === 'high') {
     q = q.filter(t => t.priority === 'critical' || t.priority === 'high');
  } else if (activeFilter === 'quick') {
     q = q.filter(t => (t.mins * 60 + t.secs) <= 900);
  } else if (activeFilter === 'long') {
     q = q.filter(t => (t.mins * 60 + t.secs) > 1800);
  } else if (activeFilter === 'med') {
     q = q.filter(t => t.priority === 'medium');
  } else if (activeFilter === 'low') {
     q = q.filter(t => t.priority === 'low');
  }
  
  const tot=q.reduce((s,t)=>s+t.mins*60+t.secs,0)+(activeId?secsLeft:0);
  document.getElementById('qTime').textContent=fmtLong(tot);
  const cnt=tasks.length;
  document.getElementById('qCnt').textContent=cnt+' task'+(cnt!==1?'s':'');
  document.getElementById('dbComp').textContent=completed.length;
  document.getElementById('dbDel').textContent=deleted.length;
  document.getElementById('dbTmpl').textContent=templates.length;
  renderTasks(q);
  if(curFolder)renderFolderC();
  
  // Boot active timer UI if needed
  if(activeId) {
     const t = tasks.find(x => x.id === activeId);
     if(t) {
         showAT(t);
         syncPlayPauseUI();
         if(!paused && !ticker) { tick(); }
     }
  }
}

function sorted(baseArray){
  let l=[...baseArray];
  if(sortMode==='time'){
    l.sort((a,b)=>(a.mins*60+a.secs)-(b.mins*60+b.secs));
    if(sortDir === 'desc') l.reverse();
  }
  else if(sortMode==='priority'){
    const PO={critical:0,high:1,medium:2,low:3};
    l.sort((a,b)=>PO[a.priority]-PO[b.priority]);
    if(sortDir === 'desc') l.reverse();
  }
  return l;
}

function renderTasks(qArray){
  const el=document.getElementById('taskItems'),hdr=document.getElementById('qhdr');
  const q = sorted(qArray);
  hdr.style.display=q.length?'flex':'none';
  if(!tasks.length&&!activeId){
    el.innerHTML=`<div class="empty"><svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>No tasks yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
    return;
  }
  if(tasks.length && !q.length) {
    el.innerHTML=`<div class="empty"><p style="margin-top:20px;">No tasks match this filter.</p></div>`;
    return;
  }
  
  el.innerHTML='';
  q.forEach(task=>{
    const ri=tasks.findIndex(t=>t.id===task.id);
    const w = document.createElement('div');
    w.className = 'ti-wrap';
    
    const dragEnabled = !sortMode && activeFilter === 'all';
    
    w.innerHTML=`
      <div class="ti-bg ti-bg-left"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="ti-bg ti-bg-right"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
      <div class="ti" data-id="${task.id}" data-idx="${ri}" draggable="${dragEnabled}">
        
        <div class="ti-header">
           <div class="p-pill ${task.priority}">${task.priority}</div>
           <div class="ti-checkbox" onclick="completeTask('${task.id}'); event.stopPropagation();"></div>
        </div>
        
        <div class="ti-body" onclick="openEditTask('${task.id}')" title="Click to edit">
          <div class="tname">${esc(task.name)}</div>
          ${task.desc ? `<div class="tdesc">${esc(task.desc)}</div>` : ''}
        </div>
        
        <div class="ti-footer">
          <div class="ttime-wrap">
             <div class="dh" style="${dragEnabled ? '' : 'display:none;'}"><svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1.3"/><circle cx="15" cy="5" r="1.3"/><circle cx="9" cy="12" r="1.3"/><circle cx="15" cy="12" r="1.3"/><circle cx="9" cy="19" r="1.3"/><circle cx="15" cy="19" r="1.3"/></svg></div>
             <span class="ttime">${fmt(task.mins*60+task.secs)}</span>
          </div>
          <button class="tbtn start" onclick="startTask('${task.id}', true); event.stopPropagation();" title="Start Task">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start
          </button>
        </div>
        
      </div>
    `;

    const tiNode = w.querySelector('.ti');
    if(dragEnabled) {
      tiNode.addEventListener('dragstart',onDS);
      tiNode.addEventListener('dragover',onDO);
      tiNode.addEventListener('drop',onDrop);
      tiNode.addEventListener('dragend',onDE);
      w.querySelector('.dh').addEventListener('touchstart',onTS,{passive:true});
    }

    tiNode.addEventListener('touchstart', onSwipeStart, {passive: true});
    tiNode.addEventListener('touchmove', onSwipeMove, {passive: false});
    tiNode.addEventListener('touchend', onSwipeEnd);

    el.appendChild(w);
  });
}

// ===== TIMER =====
window.startTask = function(id, autoStart = true){
  if(activeId)stopTimer();
  const t=tasks.find(x=>x.id===id);if(!t)return;
  activeId=id;totalSecs=t.mins*60+t.secs;secsLeft=totalSecs;origSecs=totalSecs;
  
  paused = !autoStart; 
  showAT(t);
  syncPlayPauseUI();
  
  if(autoStart) { tick(); }
  
  save(); // Cloud Sync the Start state
  render();
}

function showAT(t){
  document.getElementById('atOverlay').style.display='flex';
  document.getElementById('miniTimer').style.display='none';
  
  document.getElementById('atname').textContent=t.name;
  document.getElementById('mtname').textContent=t.name;
  
  const atPill = document.getElementById('atpill');
  atPill.className = 'p-pill ' + t.priority;
  atPill.textContent = t.priority;

  const mtPill = document.getElementById('mtpill');
  mtPill.className = 'p-pill ' + t.priority;
  mtPill.textContent = t.priority;
  
  updRing();
}

function syncPlayPauseUI() {
    const ico=document.getElementById('pauseIco'),btn=document.getElementById('pauseBtn');
    const mIco=document.getElementById('mtPauseIco'),mBtn=document.getElementById('mtPlayBtn');
    const lbl=document.getElementById('pauseLbl');
    
    if(paused){
      ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
      mIco.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
      btn.style.background='var(--bg4)';
      lbl.textContent = 'Resume';
      mBtn.style.background='var(--bg4)';
    } else {
      ico.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      mIco.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      btn.style.background='var(--bg3)';
      lbl.textContent = 'Pause';
      mBtn.style.background='var(--bg3)';
    }
}

function tick(){
  clearInterval(ticker);
  ticker=setInterval(()=>{
    if(paused)return;
    if(secsLeft>0){
      secsLeft--;
      updRing();
      // Notice we do NOT call save() here. That would spam Firestore every second.
    } else {
      clearInterval(ticker);
      playAlarm();
      document.getElementById('ring').style.stroke='var(--red)';
      toast("Time's up! Add more time or complete.");
    }
  },1000);
}

function updRing(){
  const str = fmt(secsLeft);
  document.getElementById('rtime').textContent = str;
  document.getElementById('mttime').textContent = str;
  
  const p=totalSecs>0?secsLeft/totalSecs:0;
  document.getElementById('ring').style.strokeDashoffset=565.5*(1-p);
  if(secsLeft>0)document.getElementById('ring').style.stroke='url(#timerGradient)';
}

function stopTimerLocalUI() {
  clearInterval(ticker);ticker=null;activeId=null;paused=true;
  document.getElementById('atOverlay').style.display='none';
  document.getElementById('miniTimer').style.display='none';
}

function stopTimer(){
  if(activeId) {
    const t=tasks.find(x=>x.id===activeId);
    if(t){ t.mins=Math.floor(secsLeft/60); t.secs=secsLeft%60; }
  }
  stopTimerLocalUI();
  save();
}

window.pauseResume = function(e){
  if(e) e.stopPropagation();
  paused=!paused;
  syncPlayPauseUI();
  
  if(paused) {
     clearInterval(ticker);
  } else {
     if(secsLeft===0) tick();
     else { clearInterval(ticker); tick(); }
  }
  save(); // Cloud Sync Pause State
}

window.minimizeActive = function(){
  document.getElementById('atOverlay').style.display='none';
  document.getElementById('miniTimer').style.display='flex';
}

window.maximizeActive = function(){
  document.getElementById('atOverlay').style.display='flex';
  document.getElementById('miniTimer').style.display='none';
}

window.completeActive = function(){const t=tasks.find(x=>x.id===activeId);if(!t)return;t.completedAt=Date.now();completed.unshift(t);tasks=tasks.filter(x=>x.id!==activeId);stopTimerLocalUI();save();render();toast('Task completed!');}

window.skipAndNextActive = function(){
  if(!activeId) return;
  const t = tasks.find(x=>x.id===activeId);
  if(t){
    t.completedAt=Date.now();
    completed.unshift(t);
    tasks=tasks.filter(x=>x.id!==activeId);
  }
  stopTimerLocalUI();
  save();
  
  const q = sorted(tasks);
  if(q.length > 0) {
    window.startTask(q[0].id, false);
  } else {
    render();
    toast('All tasks completed!');
  }
}

window.completeTask = function(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.completedAt=Date.now();completed.unshift(t);tasks=tasks.filter(x=>x.id!==id);if(activeId===id)stopTimerLocalUI();save();render();toast('Task completed!');}

window.resetActive = function(){
  secsLeft=origSecs;totalSecs=origSecs;
  const t=tasks.find(x=>x.id===activeId);if(t){t.mins=Math.floor(origSecs/60);t.secs=origSecs%60;}
  document.getElementById('ring').style.stroke='url(#timerGradient)';
  updRing();
  save(); // Cloud Sync Reset State
  toast('Timer reset.');
  
  if(!paused) {
     clearInterval(ticker);
     tick();
  }
}

window.deleteActive = function(){window.deleteTask(activeId);}
window.deleteTask = function(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.deletedAt=Date.now();deleted.unshift(t);tasks=tasks.filter(x=>x.id!==id);if(activeId===id)stopTimerLocalUI();save();render();toast('Task deleted.');}
window.restoreComp = function(id){const t=completed.find(x=>x.id===id);if(!t)return;delete t.completedAt;tasks.push(t);completed=completed.filter(x=>x.id!==id);save();render();toast('Restored to queue.');}
window.compToBin = function(id){const t=completed.find(x=>x.id===id);if(!t)return;t.deletedAt=Date.now();deleted.unshift(t);completed=completed.filter(x=>x.id!==id);save();render();toast('Moved to bin.');}
window.restoreDel = function(id){const t=deleted.find(x=>x.id===id);if(!t)return;delete t.deletedAt;delete t.completedAt;tasks.push(t);deleted=deleted.filter(x=>x.id!==id);save();render();toast('Restored to queue.');}
window.permDel = function(id){deleted=deleted.filter(x=>x.id!==id);save();render();toast('Permanently deleted.');}

window.addTime = function(s){
  secsLeft+=s;totalSecs+=s;
  const t=tasks.find(x=>x.id===activeId);if(t){t.mins=Math.floor(totalSecs/60);t.secs=totalSecs%60;}
  document.getElementById('ring').style.stroke='url(#timerGradient)';
  updRing();
  save(); // Cloud Sync the Added Time
  toast(`+${fmt(s)} added!`);
  
  if(!paused) {
     clearInterval(ticker);
     tick();
  }
}

window.saveTask = function(){
  const name=document.getElementById('tname').value.trim();
  const desc=document.getElementById('tdesc').value.trim();
  const mins=parseInt(document.getElementById('tmins').value)||0;
  const secs=Math.min(parseInt(document.getElementById('tsecs').value)||0,59);
  if(!name){toast('Enter a task name.');return;}if(!mins&&!secs){toast('Set a duration.');return;}
  if(editId){const t=tasks.find(x=>x.id===editId);if(t){t.name=name;t.desc=desc;t.mins=mins;t.secs=secs;t.priority=selPrio;}if(activeId===editId){totalSecs=mins*60+secs;showAT(t);}}
  else tasks.push({id:uid(),name,desc,mins,secs,priority:selPrio,createdAt:Date.now()});
  save();render();window.closeTaskM();toast(editId?'Task updated.':'Task added!');
}
document.querySelectorAll('.popt').forEach(b=>{b.onclick=()=>{selPrio=b.dataset.p;updPrioUI();};});
function updPrioUI(){document.querySelectorAll('.popt').forEach(b=>{b.className='popt';if(b.dataset.p===selPrio)b.classList.add({'critical':'sc','high':'sh','medium':'sm','low':'sl'}[selPrio]);});}
document.getElementById('tname').addEventListener('keydown',e=>{if(e.key==='Enter')window.saveTask();});

// ===== CUSTOM TIME =====
window.openCustomTime = function(){document.getElementById('emins').value='';document.getElementById('esecs').value='';document.getElementById('custM').classList.add('open');}
window.closeCust = function(){document.getElementById('custM').classList.remove('open');}
window.addCustTime = function(){const m=parseInt(document.getElementById('emins').value)||0,s=parseInt(document.getElementById('esecs').value)||0;if(!m&&!s){toast('Enter a duration.');return;}window.addTime(m*60+s);window.closeCust();}

// ===== TEMPLATES =====
window.openTmplLib = function(){closeDrawer();renderTmplList();document.getElementById('tmplM').classList.add('open');}
window.closeTmplLib = function(){document.getElementById('tmplM').classList.remove('open');}
function renderTmplList(){
  const el=document.getElementById('tmplList');
  if(!templates.length){el.innerHTML='<p style="color:var(--text3);font-size:15px;text-align:center;padding:24px 0;">No templates yet.</p>';return;}
  el.innerHTML='';
  templates.forEach(tm=>{
    const d=document.createElement('div');d.className='titem';
    d.innerHTML=`<div style="flex:1;"><div class="tiname">${esc(tm.name)}</div><div class="ticnt">${tm.tasks.length} task${tm.tasks.length!==1?'s':''}</div></div><button class="tidel" onclick="delTmpl('${tm.id}');event.stopPropagation();"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    d.onclick=()=>loadTmpl(tm.id);el.appendChild(d);
  });
}
window.openSaveTmpl = function(){if(!tasks.length){closeDrawer();toast('No tasks to save.');return;}closeDrawer();document.getElementById('tmplN').value='';document.getElementById('saveTM').classList.add('open');}
window.closeSaveTmpl = function(){document.getElementById('saveTM').classList.remove('open');}
window.doSaveTmpl = function(){const n=document.getElementById('tmplN').value.trim();if(!n){toast('Enter a name.');return;}templates.push({id:uid(),name:n,tasks:tasks.map(t=>({name:t.name,desc:t.desc||'',mins:t.mins,secs:t.secs,priority:t.priority}))});save();window.closeSaveTmpl();render();toast('Template saved!');}
window.loadTmpl = function(id){const tm=templates.find(t=>t.id===id);if(!tm)return;tm.tasks.forEach(t=>tasks.push({id:uid(),name:t.name,desc:t.desc||'',mins:t.mins,secs:t.secs,priority:t.priority,createdAt:Date.now()}));save();window.closeTmplLib();render();toast(`Loaded "${tm.name}"!`);}
window.delTmpl = function(id){templates=templates.filter(t=>t.id!==id);save();renderTmplList();render();toast('Template deleted.');}

// ===== DRAG REORDER (MOBILE) =====
let tdt=null,toi=null;
function onTS(e){tdt=this.closest('.ti-wrap');toi=parseInt(tdt.querySelector('.ti').dataset.idx);}
document.addEventListener('touchmove',e=>{
  if(!tdt)return;const y=e.touches[0].clientY;
  document.querySelectorAll('.ti-wrap').forEach(el=>{
    if(el===tdt)return;const r=el.getBoundingClientRect();
    if(y>r.top&&y<r.bottom){
       const oi=parseInt(el.querySelector('.ti').dataset.idx);
       if(oi!==toi){const[m]=tasks.splice(toi,1);tasks.splice(oi,0,m);toi=oi;save();render();}
    }
  });
},{passive:true});
document.addEventListener('touchend',()=>{tdt=null;toi=null;});

// ===== DRAG & DROP (DESKTOP) =====
let dsi=null,doi=null;
function onDS(e){dsi=parseInt(this.dataset.idx);this.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDO(e){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over'));this.classList.add('drag-over');doi=parseInt(this.dataset.idx);}
function onDrop(e){e.preventDefault();if(dsi===null||doi===null||dsi===doi)return;const[m]=tasks.splice(dsi,1);tasks.splice(doi,0,m);dsi=null;doi=null;save();render();}
function onDE(){document.querySelectorAll('.ti').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});}

// Close modals on scrim
document.querySelectorAll('.mscrim').forEach(s=>{s.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

// ===== UTILS =====
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}
function fmtLong(s){if(s<3600)return fmt(s);return`${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tsince(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}
let tT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2600);}

render();
</script>
</body>
</html>
